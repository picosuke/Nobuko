<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホームページ</title>
  <style>
    /* ------------------------------
       全体の基本設定
    ------------------------------ */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Yu Mincho', 'Sawarabi Mincho', serif; 
      background-color: #f9f9f5;
      color: #333;
    }

    /* ------------------------------
       一番上のストライプ柄
    ------------------------------ */
    .top-stripe {
      height: 12px;
      background: repeating-linear-gradient(
        to right,
        #e0e0db,
        #e0e0db 4px,
        #f9f9f5 4px,
        #f9f9f5 8px
      );
    }

    /* ------------------------------
       ヘッダー部分（中央寄せ・余白たっぷり）
    ------------------------------ */
    .header-06 {
      height: 100px; /* 文字を大きくしたので、縦幅も少し広げました */
      background-color: #f9f9f5;
      display: flex;
      justify-content: center; /* メニューを完全に「ど真ん中」に配置 */
      align-items: center;
      border-top: 1px solid #ccc; /* 線の色を少し柔らかくしました */
      border-bottom: 1px solid #ccc;
    }
    
    .header-06 .nav {
      display: flex;
      gap: 70px; /* メニュー同士の隙間をガッツリ広げました */
    }
    
    .header-06 .nav a {
      color: #333;
      text-decoration: none;
      font-size: 20px; /* 文字サイズを大きく */
      letter-spacing: 4px; /* 1文字ごとの間隔を広げてゆったり見せる */
      transition: color 0.3s;
    }
    
    /* マウスを乗せた時のアクション */
    .header-06 .nav a:hover {
      color: #888; /* 薄くなるように変更 */
    }

    /* ------------------------------
       自然な写真が入るエリア
    ------------------------------ */
    .hero-area {
      height: 400px;
      background-color: #ebebe6; 
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }
    .hero-area h1 {
      margin: 0;
      color: #999;
      font-size: 24px;
      font-weight: normal;
      letter-spacing: 6px;
    }

    /* ------------------------------
       内容エリア
    ------------------------------ */
    .content-area {
      min-height: 500px;
      background-color: #f9f9f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px;
    }
    .content-area h2 {
      margin: 0 0 20px 0;
      color: #333;
      font-size: 28px;
      font-weight: normal;
      letter-spacing: 4px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }
    .content-area p {
      color: #555;
      line-height: 2;
      letter-spacing: 1px;
    }

  </style>
</head>
<body>

  <!-- 一番上のストライプ柄 -->
  <div class="top-stripe"></div>

  <!-- ここはヘッダー（ロゴを消してメニューのみに） -->
  <header class="header-06">
    <nav class="nav">
      <a href="#">ホーム</a>
      <a href="#">歴史</a>
      <a href="#">のぶ子信者</a>
      <a href="#">話し合い</a>
    </nav>
  </header>

  <!-- 自然な写真が入るエリア -->
  <div class="hero-area">
    <h1>[ ここに自然な写真が入ります ]</h1>
  </div>

  <!-- ここは内容 -->
  <main class="content-area">
    <h2>ここは内容</h2>
    <p>ここに教えや、信者に向けたメッセージが入ります。</p>
  </main>

</body>
</html>
