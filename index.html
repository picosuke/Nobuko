<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホームページ</title>
  <style>
    /* （CSSは先ほどと全く同じです） */
    body { margin: 0; padding: 0; font-family: 'Yu Mincho', 'Sawarabi Mincho', serif; background-color: #f9f9f5; color: #333; }
    .top-stripe { height: 12px; background: repeating-linear-gradient(to right, #e0e0db, #e0e0db 4px, #f9f9f5 4px, #f9f9f5 8px); }
    .header-06 { height: 90px; background-color: #f9f9f5; padding: 0 10%; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; }
    .header-06 .logo { font-size: 28px; font-weight: normal; letter-spacing: 4px; color: #333; }
    .header-06 .nav { display: flex; gap: 60px; margin-right: 30px; }
    
    /* メニューの文字 */
    .header-06 .nav a { color: #333; text-decoration: none; font-size: 18px; letter-spacing: 3px; transition: all 0.3s; padding-bottom: 5px; border-bottom: 1px solid transparent; }
    .header-06 .nav a:hover, .header-06 .nav a.active { color: #888; border-bottom: 1px solid #888; }

    /* コンテンツの切り替え設定 */
    .page-section { display: none; animation: fadeIn 0.8s ease-in-out; }
    .page-section.active { display: block; }
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

    /* 写真・内容エリア */
    .hero-area { height: 400px; background-color: #ebebe6; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #ddd; }
    .hero-area h1 { margin: 0; color: #999; font-size: 24px; font-weight: normal; letter-spacing: 6px; }
    .content-area { min-height: 500px; background-color: #f9f9f5; display: flex; flex-direction: column; align-items: center; padding-top: 80px; }
    .content-area h2 { margin: 0 0 20px 0; color: #333; font-size: 28px; font-weight: normal; letter-spacing: 4px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .content-area p { color: #555; line-height: 2; letter-spacing: 1px; }
    
    #chat-container { width: 100%; max-width: 600px; margin: 20px auto; background: #fff; border: 1px solid #ccc; padding: 20px; }
    #messages { height: 300px; overflow-y: auto; border-bottom: 1px solid #eee; margin-bottom: 10px; padding: 10px; text-align: left; }
    .msg { margin-bottom: 10px; font-size: 14px; }
    .msg-name { font-weight: bold; color: #555; margin-right: 10px; }
    .chat-input { display: flex; gap: 10px; }
    #user-name { width: 80px; }
    #message-input { flex-grow: 1; }
    
  </style>
</head>
<body>

  <div class="top-stripe"></div>

  <!-- ▼ hrefに #home のように書くだけでOKになりました -->
  <header class="header-06">
    <div class="logo">教団名 / ロゴ</div>
    <nav class="nav">
      <a href="#home" class="menu-btn">ホーム</a>
      <a href="#history" class="menu-btn">歴史</a>
      <a href="#nobuko" class="menu-btn">のぶ子信者</a>
      <a href="#discussion" class="menu-btn">話し合い</a>
    </nav>
  </header>

  <!-- ▼ id名を href と同じにするだけです -->
  <div id="home" class="page-section">
    <div class="hero-area"><h1>[ ホームの写真 ]</h1></div>
    <main class="content-area"><h2>ホーム</h2><p>ここはメインの入り口です。</p></main>
  </div>

  <div id="history" class="page-section">
    <div class="hero-area" style="background-color: #e0e0db;"><h1>[ 歴史の写真 ]</h1></div>
    <main class="content-area"><h2>教団の歴史</h2><p>創設からの歩み。</p></main>
  </div>

  <div id="nobuko" class="page-section">
    <div class="hero-area" style="background-color: #d1cbcb;"><h1>[ シンボルの写真 ]</h1></div>
    <main class="content-area"><h2>のぶ子信者について</h2><p>選ばれし信者たちの心得。</p></main>
  </div>

  <div id="discussion" class="page-section">
    <div class="hero-area" style="background-color: #d6d9d1;"><h1>[ 集会の写真 ]</h1></div>
    <main class="content-area">
      <div id="chat-container">
        <div id="messages"></div>
        <div class="chat-input">
          <input type="text" id="user-name" placeholder="名無し">
          <input type="text" id="message-input" placeholder="メッセージを入力...">
          <button id="send-btn">送信</button>
        </div>
      </div>
    </main>
  </div>

  <!-- ▼▼▼ JSも超シンプルになりました ▼▼▼ -->
  <script>
    function showSection() {
      // 1. URLの末尾（#homeなど）を取得。何もなければデフォルトで #home にする
      const hash = window.location.hash || '#home';

      // 2. 一旦すべての画面を隠し、URLのハッシュと同じIDを持つ画面だけを表示する
      document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
      const targetSec = document.querySelector(hash);
      if (targetSec) targetSec.classList.add('active');

      // 3. メニューの下線（active）も、選ばれているものに移動させる
      document.querySelectorAll('.menu-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('href') === hash) {
          btn.classList.add('active');
        }
      });
    }

    // ページを最初に開いた時に実行する
    window.addEventListener('DOMContentLoaded', showSection);
    
    // メニューをクリックして、URLの #○○ が変わった時に実行する
    window.addEventListener('hashchange', showSection);
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    // ★ここに、Firebaseでコピーした自分の Config を貼り付けてください
    const firebaseConfig = {
      apiKey: "AIzaSyAPUhjD7Zg8togYokPISJcFYvvoRJBcIkk",
      authDomain: "nobuko-f3d50.firebaseapp.com",
      projectId: "nobuko-f3d50",
      storageBucket: "nobuko-f3d50.firebasestorage.app",
      messagingSenderId: "58905285751",
      appId: "1:58905285751:web:66c687031ad8a9a746e272",
      measurementId: "G-J9GSF1LFRC"
    };

    // Firebaseの初期化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // HTMLの要素を取得
    const messageInput = document.getElementById('message-input');
    const nameInput = document.getElementById('user-name');
    const sendBtn = document.getElementById('send-btn');
    const messagesDiv = document.getElementById('messages');

    // メッセージを送る関数
    sendBtn.addEventListener('click', async () => {
      const text = messageInput.value;
      const name = nameInput.value || "名無しの信者";
      if (text === "") return;

      await addDoc(collection(db, "messages"), {
        name: name,
        text: text,
        timestamp: serverTimestamp()
      });
      messageInput.value = "";
    });

    // メッセージをリアルタイムで受け取って表示する
    const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
    onSnapshot(q, (snapshot) => {
      messagesDiv.innerHTML = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<span class="msg-name">${data.name}:</span><span>${data.text}</span>`;
        messagesDiv.appendChild(div);
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight; // 自動スクロール
    });
  </script>

</body>
</html>
