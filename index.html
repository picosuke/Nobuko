<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホームページ</title>
  <style>
    /* ------------------------------
       全体の基本設定（06番風）
    ------------------------------ */
    body {
      margin: 0;
      padding: 0;
      /* 06番の特徴：全体を明朝体に */
      font-family: 'Yu Mincho', 'Sawarabi Mincho', serif; 
      /* 06番の特徴：真っ白ではなく、少しだけ温かみのあるアイボリー背景 */
      background-color: #f9f9f5;
      color: #333;
    }

    /* ------------------------------
       一番上のストライプ柄
    ------------------------------ */
    .top-stripe {
      height: 10px;
      /* 派手な水色から、クラシックで落ち着いたグレーの細いストライプに変更 */
      background: repeating-linear-gradient(
        to right,
        #e0e0db,
        #e0e0db 4px,
        #f9f9f5 4px,
        #f9f9f5 8px
      );
    }

    /* ------------------------------
       ヘッダー部分（06番を完全再現）
    ------------------------------ */
    .header-06 {
      height: 80px;
      background-color: #f9f9f5;
      padding: 0 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      /* 06番の特徴：上下に細い黒（ダークグレー）の直線を引く */
      border-top: 1px solid #333;
      border-bottom: 1px solid #333;
    }
    .header-06 .logo {
      font-size: 28px;
      font-weight: normal; /* 太字をやめて上品に */
      letter-spacing: 4px; /* 文字の間隔を広げて厳かに */
      color: #333;
    }
    .header-06 .nav {
      display: flex;
      gap: 40px; /* メニューの間隔を広めにとる */
    }
    .header-06 .nav a {
      color: #333;
      text-decoration: none;
      font-size: 16px;
      letter-spacing: 2px;
      transition: opacity 0.3s;
    }
    .header-06 .nav a:hover {
      opacity: 0.5; /* マウスを乗せるとフワッと薄くなる */
    }

    /* ------------------------------
       自然な写真が入るエリア
    ------------------------------ */
    .hero-area {
      height: 400px; /* 写真が入ることを想定して少し高さを出しました */
      /* ここに後から実際の写真（background-image）を入れます。今は仮のグレー背景 */
      background-color: #ebebe6; 
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }
    .hero-area h1 {
      margin: 0;
      color: #999; /* 写真が入るまでの仮の文字なので薄い色に */
      font-size: 24px;
      font-weight: normal;
      letter-spacing: 6px;
    }

    /* ------------------------------
       内容エリア
    ------------------------------ */
    .content-area {
      min-height: 500px;
      background-color: #f9f9f5;
      display: flex;
      flex-direction: column; /* 縦に並べる設定 */
      align-items: center;
      padding-top: 80px; /* 上からの余白をたっぷり取る */
    }
    .content-area h2 {
      margin: 0 0 20px 0;
      color: #333;
      font-size: 28px;
      font-weight: normal;
      letter-spacing: 4px;
      border-bottom: 1px solid #333; /* 見出しの下に細い線を引く */
      padding-bottom: 10px;
    }
    .content-area p {
      color: #555;
      line-height: 2; /* 行間を広げて読みやすく */
      letter-spacing: 1px;
    }

  </style>
</head>
<body>

  <!-- 一番上のストライプ柄 -->
  <div class="top-stripe"></div>

  <!-- ここはヘッダー（06番） -->
  <header class="header-06">
    <div class="logo">教団名 / ロゴ</div>
    <nav class="nav">
      <a href="#">ホーム</a>
      <a href="#">歴史</a>
      <a href="#">のぶ子信者</a>
      <a href="#">話し合い</a>
    </nav>
  </header>

  <!-- 自然な写真が入るエリア -->
  <div class="hero-area">
    <h1>[ ここに自然な写真が入ります ]</h1>
  </div>

  <!-- ここは内容 -->
  <main class="content-area">
    <h2>ここは内容</h2>
    <p>ここに教えや、信者に向けたメッセージが入ります。</p>
  </main>

</body>
</html>
