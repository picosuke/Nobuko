<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホームページ</title>
  <style>
    /* （CSSは先ほどと全く同じです） */
    body { margin: 0; padding: 0; font-family: 'Yu Mincho', 'Sawarabi Mincho', serif; background-color: #f9f9f5; color: #333; }
    .top-stripe { height: 12px; background: repeating-linear-gradient(to right, #e0e0db, #e0e0db 4px, #f9f9f5 4px, #f9f9f5 8px); }
    .header-06 { height: 90px; background-color: #f9f9f5; padding: 0 10%; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; }
    .header-06 .logo { font-size: 28px; font-weight: normal; letter-spacing: 4px; color: #333; }
    .header-06 .nav { display: flex; gap: 60px; margin-right: 30px; }
    
    /* メニューの文字 */
    .header-06 .nav a { color: #333; text-decoration: none; font-size: 18px; letter-spacing: 3px; transition: all 0.3s; padding-bottom: 5px; border-bottom: 1px solid transparent; }
    .header-06 .nav a:hover, .header-06 .nav a.active { color: #888; border-bottom: 1px solid #888; }

    /* コンテンツの切り替え設定 */
    .page-section { display: none; animation: fadeIn 0.8s ease-in-out; }
    .page-section.active { display: block; }
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

    /* 写真・内容エリア */
    .hero-area { height: 400px; background-color: #ebebe6; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #ddd; }
    .hero-area h1 { margin: 0; color: #999; font-size: 24px; font-weight: normal; letter-spacing: 6px; }
    .content-area { min-height: 500px; background-color: #f9f9f5; display: flex; flex-direction: column; align-items: center; padding-top: 80px; }
    .content-area h2 { margin: 0 0 20px 0; color: #333; font-size: 28px; font-weight: normal; letter-spacing: 4px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .content-area p { color: #555; line-height: 2; letter-spacing: 1px; }
    /* チャット全体のデザイン（06番風） */
#chat-wrapper {
  width: 90%;
  max-width: 800px;
  margin: 0 auto;
  font-family: 'Yu Mincho', serif;
}

#messages-list {
  height: 500px;
  overflow-y: auto;
  background-color: #fdfdfb;
  border: 1px solid #ccc;
  padding: 20px;
  margin-bottom: 20px;
}

/* 個別のメッセージ箱 */
.message-item {
  border-bottom: 1px solid #eee;
  padding: 15px 0;
  display: flex;
  flex-direction: column;
}

.msg-info {
  font-size: 13px;
  color: #888;
  margin-bottom: 5px;
  display: flex;
  justify-content: space-between;
}

.msg-text {
  font-size: 17px;
  color: #333;
  line-height: 1.6;
  letter-spacing: 1px;
}

/* いいねボタンのデザイン */
.like-area {
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.like-btn {
  background: none;
  border: 1px solid #ccc;
  color: #888;
  cursor: pointer;
  padding: 2px 10px;
  font-size: 12px;
  transition: all 0.3s;
}

.like-btn:hover {
  background-color: #333;
  color: #fff;
}

/* 入力エリア */
.chat-controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: #f4f4f0;
  padding: 20px;
  border: 1px solid #ccc;
}

.input-row {
  display: flex;
  gap: 10px;
}

#user-name { width: 120px; padding: 10px; border: 1px solid #ccc; font-family: inherit; }
#message-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; font-family: inherit; }

#send-btn {
  background: #333;
  color: #fff;
  border: none;
  padding: 10px 30px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 2px;
}

/* 管理用：全消しボタン */
.admin-area {
  margin-top: 40px;
  text-align: right;
}

#delete-all-btn {
  background: none;
  border: none;
  color: #ccc;
  text-decoration: underline;
  cursor: pointer;
  font-size: 12px;
}
#delete-all-btn:hover { color: #a00; }
    
  </style>
</head>
<body>

  <div class="top-stripe"></div>

  <!-- ▼ hrefに #home のように書くだけでOKになりました -->
  <header class="header-06">
    <div class="logo">教団名 / ロゴ</div>
    <nav class="nav">
      <a href="#home" class="menu-btn">ホーム</a>
      <a href="#history" class="menu-btn">歴史</a>
      <a href="#nobuko" class="menu-btn">のぶ子信者</a>
      <a href="#discussion" class="menu-btn">話し合い</a>
    </nav>
  </header>

  <!-- ▼ id名を href と同じにするだけです -->
  <div id="home" class="page-section">
    <div class="hero-area"><h1>[ ホームの写真 ]</h1></div>
    <main class="content-area"><h2>ホーム</h2><p>ここはメインの入り口です。</p></main>
  </div>

  <div id="history" class="page-section">
    <div class="hero-area" style="background-color: #e0e0db;"><h1>[ 歴史の写真 ]</h1></div>
    <main class="content-area"><h2>教団の歴史</h2><p>創設からの歩み。</p></main>
  </div>

  <div id="nobuko" class="page-section">
    <div class="hero-area" style="background-color: #d1cbcb;"><h1>[ シンボルの写真 ]</h1></div>
    <main class="content-area"><h2>のぶ子信者について</h2><p>選ばれし信者たちの心得。</p></main>
  </div>

  <div id="discussion" class="page-section">
    <div class="hero-area" style="background-color: #d6d9d1;"><h1>[ 集会の写真 ]</h1></div>
    <main class="content-area">
      <div id="chat-wrapper">
        <!-- メッセージが表示される箱 -->
        <div id="messages-list"></div>

        <!-- 入力エリア -->
        <div class="chat-controls">
          <div class="input-row">
            <input type="text" id="user-name" placeholder="名前（名無しの信者）">
            <input type="text" id="message-input" placeholder="言葉を刻む...">
            <button id="send-btn">送信</button>
          </div>
        </div>

        <!-- 管理用：全消しボタン（ひっそり配置） -->
        <div class="admin-area">
          <button id="delete-all-btn">記録を浄化する（全削除）</button>
        </div>
      </div>
    </main>
  </div>

  <!-- ▼▼▼ JSも超シンプルになりました ▼▼▼ -->
  <script>
    function showSection() {
      // 1. URLの末尾（#homeなど）を取得。何もなければデフォルトで #home にする
      const hash = window.location.hash || '#home';

      // 2. 一旦すべての画面を隠し、URLのハッシュと同じIDを持つ画面だけを表示する
      document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
      const targetSec = document.querySelector(hash);
      if (targetSec) targetSec.classList.add('active');

      // 3. メニューの下線（active）も、選ばれているものに移動させる
      document.querySelectorAll('.menu-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('href') === hash) {
          btn.classList.add('active');
        }
      });
    }

    // ページを最初に開いた時に実行する
    window.addEventListener('DOMContentLoaded', showSection);
    
    // メニューをクリックして、URLの #○○ が変わった時に実行する
    window.addEventListener('hashchange', showSection);
  </script>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, getDocs, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const firebaseConfig = {
  // ★ここに自分の設定を貼り付け！
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const messagesList = document.getElementById('messages-list');
const messageInput = document.getElementById('message-input');
const nameInput = document.getElementById('user-name');
const sendBtn = document.getElementById('send-btn');
const deleteAllBtn = document.getElementById('delete-all-btn');

// メッセージ送信
sendBtn.addEventListener('click', async () => {
  const text = messageInput.value;
  const name = nameInput.value || "無名の信者";
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    name: name,
    text: text,
    likes: 0,
    timestamp: serverTimestamp()
  });
  messageInput.value = "";
});

// リアルタイム表示（番号表示対応）
const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
onSnapshot(q, (snapshot) => {
  messagesList.innerHTML = "";
  let index = 1; // メッセージ番号
  
  snapshot.forEach((messageDoc) => {
    const data = messageDoc.data();
    const id = messageDoc.id;
    
    const div = document.createElement('div');
    div.className = 'message-item';
    div.innerHTML = `
      <div class="msg-info">
        <span>第 ${index} 柱</span>
        <span>${data.name}</span>
      </div>
      <div class="msg-text">${data.text}</div>
      <div class="like-area">
        <button class="like-btn" onclick="addLike('${id}')">奉納 (いいね) ${data.likes || 0}</button>
      </div>
    `;
    messagesList.appendChild(div);
    index++;
  });
  messagesList.scrollTop = messagesList.scrollHeight;
});

// いいね機能
window.addLike = async (id) => {
  const docRef = doc(db, "messages", id);
  await updateDoc(docRef, {
    likes: increment(1)
  });
};

// 全消し機能（注意：すべて消えます）
deleteAllBtn.addEventListener('click', async () => {
  if (!confirm("すべての話し合いの記録を抹消しますか？")) return;
  
  const snapshot = await getDocs(collection(db, "messages"));
  const batch = writeBatch(db);
  snapshot.forEach((doc) => {
    batch.delete(doc.ref);
  });
  await batch.commit();
  alert("記録は浄化されました。");
});
  </script>

</body>
</html>
