<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホームページ</title>
  <style>
    /* ------------------------------
       全体の基本設定
    ------------------------------ */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Yu Mincho', 'Sawarabi Mincho', serif; /* 06番の特徴：明朝体 */
    }

    /* ------------------------------
       画像の一番上にあったストライプ
    ------------------------------ */
    .top-stripe {
      height: 12px;
      /* 薄い水色と白の縦シマシマ */
      background: repeating-linear-gradient(
        to right,
        #cce0ff,
        #cce0ff 15px,
        #ffffff 15px,
        #ffffff 30px
      );
      border-bottom: 3px solid #000; /* 下に黒い太線 */
    }

    /* ------------------------------
       紫のヘッダー部分（06番ベース）
    ------------------------------ */
    .header-06 {
      height: 80px;
      background-color: #9d65ff; /* 画像の紫色 */
      padding: 0 40px;
      display: flex;
      justify-content: space-between; /* 左右に分ける */
      align-items: center;
      border-bottom: 3px solid #000; /* 下に黒い太線 */
    }
    .header-06 .logo {
      font-size: 26px;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 2px;
    }
    .header-06 .nav {
      display: flex;
      gap: 30px; /* メニューの間隔 */
    }
    .header-06 .nav a {
      color: #ffffff;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: opacity 0.3s;
    }
    .header-06 .nav a:hover {
      opacity: 0.7; /* マウスを乗せると少し薄くなる */
    }

    /* ------------------------------
       自然な写真が入るエリア
    ------------------------------ */
    .hero-area {
      height: 150px; /* 写真エリアの高さ */
      /* 画像の緑〜青のグラデーションを再現 */
      background: linear-gradient(to right, #6ae5b1, #6983ff);
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 3px solid #000; /* 下に黒い太線 */
    }
    .hero-area h1 {
      margin: 0;
      color: #ffffff;
      font-size: 40px;
      font-weight: normal;
      letter-spacing: 4px;
      font-family: sans-serif; /* ここだけ画像っぽくゴシック体に */
    }

    /* ------------------------------
       ピンクの内容エリア
    ------------------------------ */
    .content-area {
      min-height: 500px; /* 内容エリアの高さ */
      background-color: #ff6b81; /* 画像のピンク色 */
      display: flex;
      justify-content: center;
      padding-top: 50px; /* 上からの余白 */
    }
    .content-area h2 {
      margin: 0;
      color: #ffffff;
      font-size: 40px;
      font-weight: normal;
      letter-spacing: 4px;
      font-family: sans-serif; /* ここも画像っぽくゴシック体に */
    }

  </style>
</head>
<body>

  <!-- 一番上のストライプ柄 -->
  <div class="top-stripe"></div>

  <!-- ここはヘッダー（06番のレイアウト＋紫色） -->
  <header class="header-06">
    <div class="logo">教団名/ロゴ</div>
    <nav class="nav">
      <a href="#">ホーム</a>
      <a href="#">歴史</a>
      <a href="#">のぶ子信者</a>
      <a href="#">話し合い</a>
    </nav>
  </header>

  <!-- 自然な写真（グラデーション部分） -->
  <div class="hero-area">
    <h1>自然な写真</h1>
  </div>

  <!-- ここは内容（ピンク部分） -->
  <main class="content-area">
    <h2>ここは内容</h2>
  </main>

</body>
</html>
